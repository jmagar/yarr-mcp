# =============================================================================
# .cargo/config.toml — Cargo workspace configuration for rustarr
#
# The [alias] section wires `cargo xtask` so it runs the xtask crate.
#
# Most build settings (linker, profile tuning, jobs) live in the developer's
# ~/.cargo/config.toml. This file only adds workspace-local settings that the
# global config cannot provide.
#
# See docs/RUST.md for the expected global config, system tool requirements,
# and the rules for what belongs here vs. the global config.
# =============================================================================

[alias]
# The `cargo xtask` convention: `cargo xtask <cmd>` delegates to the xtask crate.
# See: https://github.com/matklad/cargo-xtask
xtask = "run --package xtask --"

[build]
# Keep completed Cargo binary artifacts in ./bin without committing them.
rustc-wrapper = "scripts/cargo-rustc-wrapper"

