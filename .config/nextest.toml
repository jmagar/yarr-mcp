# =============================================================================
# .config/nextest.toml — cargo-nextest configuration
#
# TEMPLATE: Copy this file unchanged to any new server repo.
#           Adjust fail-fast and retry settings if your test suite has
#           specific requirements (e.g. integration tests that can flake).
#
# Install nextest:  cargo install cargo-nextest
# Run tests:        cargo nextest run
# Run CI profile:   cargo nextest run --profile ci
# =============================================================================

# ── Default profile (local development) ──────────────────────────────────────
[profile.default]
# Continue running other tests even if one fails. Gives you the full picture
# of what's broken before fixing anything.
fail-fast = false

# No retries locally — flaky tests should be fixed, not hidden.
retries = 0

# Show test output only for failures (keeps output clean).
# Options: never, failure, immediate, immediate-final, always
failure-output = "immediate"

# ── CI profile (used by .github/workflows/ci.yml) ────────────────────────────
[profile.ci]
# Stop immediately on first failure in CI — saves credits and surfaces errors fast.
fail-fast = true

# Retry each test once before marking it as failed. Handles transient network
# or timing issues in integration tests without hiding real failures.
# TEMPLATE: Increase to 3 for services with flaky network-dependent tests.
retries = 2

# Always show output in CI so logs contain full failure context.
failure-output = "immediate-final"

# ── Optional: test groups for parallelism control ─────────────────────────────
# TEMPLATE: Uncomment and configure if your integration tests need to run
#           against a single server instance (can't parallelize).
#
# [test-groups]
# serial-integration = { max-threads = 1 }
#
# [[profile.default.overrides]]
# filter = 'test(integration)'
# test-group = 'serial-integration'
