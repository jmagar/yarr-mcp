version: 2
updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 10
  groups:
    rmcp:
      patterns:
      - rmcp*
    serde:
      patterns:
      - serde*
    tokio:
      patterns:
      - tokio*
    axum:
      patterns:
      - axum*
      - tower*
      - hyper*
    tracing:
      patterns:
      - tracing*
  labels:
  - dependencies
  - rust
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 5
  groups:
    docker-actions:
      patterns:
      - docker/*
      - aquasecurity/trivy-action
    github-actions:
      patterns:
      - actions/*
      - dtolnay/*
      - taiki-e/*
      - EmbarkStudios/*
      - gitleaks/*
      - github/codeql-action
      - dependabot/*
      - softprops/*
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
- package-ecosystem: docker
  directory: /config
  schedule:
    interval: weekly
    day: monday
    time: 09:00
    timezone: America/New_York
  labels:
  - dependencies
  - docker
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
