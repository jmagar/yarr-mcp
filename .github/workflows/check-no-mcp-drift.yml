name: Check no-MCP drift

on:
  schedule:
    - cron: "53 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check no-MCP branch drift
        run: scripts/check-no-mcp-drift --compare-ref
