# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# This workflow runs on every push and PR to main.
# Jobs: fmt, clippy, docs, test (nextest), toml, contract checks, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false
  RUST_BACKTRACE: 1

jobs:
  # -- actionlint: GitHub Actions workflow syntax and shell checks -------------
  actionlint:
    name: Actionlint
    runs-on: [self-hosted, unraid]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.9

  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable with rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable with clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── docs: rustdoc with zero warnings (broken/ambiguous intra-doc links) ──────
  docs:
    name: Docs
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-docs-

      - name: cargo doc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    runs-on: [self-hosted, unraid]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Cache Cargo registry and build artifacts between runs.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

  # ── npm: package launcher checks ────────────────────────────────────────────
  npm:
    name: NPM Package
    runs-on: [self-hosted, unraid]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: npm test
        run: npm test --prefix packages/yarr-mcp

      - name: npm run check
        run: npm run check --prefix packages/yarr-mcp

      - name: Plugin manifest launcher pins are in sync
        run: node scripts/sync-plugin-manifests.js --check

      - name: npm pack dry run
        run: npm pack --dry-run --json ./packages/yarr-mcp

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install taplo
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2
        with:
          tool: taplo-cli

      - name: taplo check
        run: taplo check

  # ── contracts: generated docs, plugin layout, coupled files ─────────────────
  template:
    name: Repo Contracts
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Check PATTERNS.md contracts
        run: cargo xtask patterns

      - name: Check test sibling coverage
        run: cargo xtask check-test-siblings

      - name: Validate plugin layout
        run: bash scripts/validate-plugin-layout.sh

      - name: Check schema docs
        run: python3 scripts/check-schema-docs.py --check

      - name: Run feature smoke tests
        run: bash scripts/test-template-features.sh

      - name: Check blob sizes
        run: python3 scripts/check-blob-size.py --base origin/main --head HEAD

      - name: Check coupled files
        run: bash scripts/check-coupled-files.sh origin/main HEAD

      - name: ASCII hygiene
        run: bash scripts/run-ascii-check.sh

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check security exception deadlines
        run: bash scripts/check-security-exceptions.sh

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check
          arguments: --all-features

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: [self-hosted, unraid]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            scan_range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            scan_range="${{ github.event.before }}..${{ github.sha }}"
          fi
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git --redact --verbose --log-opts="${scan_range}" /repo
