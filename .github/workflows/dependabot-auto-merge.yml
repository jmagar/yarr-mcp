name: Dependabot Auto-merge

on:
  # Dependabot pull_request runs cannot read repository Actions secrets. This
  # target workflow never checks out or executes PR code; it only reads pinned
  # metadata, waits for required checks, and invokes the GitHub API.
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    name: Merge verified patch/minor updates
    runs-on: [self-hosted, unraid]
    timeout-minutes: 45
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          test -n "$RELEASE_PLEASE_TOKEN"
          gh pr checks --required --watch --interval 20 "$PR_URL"
          gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # A GitHub App installation token or fine-grained PAT is required.
          # Unlike GITHUB_TOKEN, its merge commit triggers trusted push workflows.
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
