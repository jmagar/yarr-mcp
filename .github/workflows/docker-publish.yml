# =============================================================================
# .github/workflows/docker-publish.yml — Build and publish Docker image
#
# Triggers:
#   - push to main → builds and pushes :latest tag
#   - push of v* tag → builds and pushes :<version> tag + GitHub Release assets
#
# Registry: ghcr.io/jmagar/yarr-mcp
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

# Serialize builds per ref so concurrent push:main and tags:v* runs don't race
# on the registry. Don't cancel in-progress publishes — a half-pushed image is
# worse than a queued one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/jmagar/yarr-mcp

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      # Immutable digest of the pushed image, consumed by the trivy scan job.
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        # TODO(security): pin to full commit SHA like checkout above.
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        # TODO(security): pin to full commit SHA like checkout above.
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine the Docker tags to push:
      #   main branch  → :latest
      #   v1.2.3 tag   → :1.2.3 AND :latest
      - name: Docker metadata
        id: meta
        # TODO(security): pin to full commit SHA like checkout above.
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push the production Linux image. Keep this amd64-only for now:
      # the arm64 QEMU build has repeatedly wedged this workflow before it can
      # publish or reach the Trivy scan.
      # TODO(security): pin docker/build-push-action to a full commit SHA
      # (e.g. @<sha> # v6.18.0) to match the SHA-pinned actions in ci.yml.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: config/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations: SLSA build provenance + SBOM attached to
          # the image manifest so consumers can verify how it was built.
          provenance: true
          sbom: true

  # ── Trivy vulnerability scan ─────────────────────────────────────────────────
  trivy:
    name: Trivy Vulnerability Scan
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    env:
      # Exact digest of the image the `docker` job just built and pushed.
      IMAGE_REF: ghcr.io/jmagar/yarr-mcp@${{ needs.docker.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Scan the immutable digest we just built, NOT the mutable :latest tag.
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
