# =============================================================================
# .github/workflows/openwiki-update.yml — keep openwiki/ docs current
#
# Runs OpenWiki (https://github.com/langchain-ai/openwiki) on a schedule and
# opens a PR when the generated docs under openwiki/ drift from the repo.
#
# Uses the default GITHUB_TOKEN, so (like other bot-authored PRs in this repo)
# it will NOT trigger downstream push/pull_request workflows such as ci.yml —
# see the note in release-please.yml. Fine for a docs-only PR; review by hand
# before merging.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY   - required
#   ANTHROPIC_BASE_URL  - optional, only if routing through a proxy/gateway
#   LANGSMITH_API_KEY   - optional, enables LangSmith tracing
# =============================================================================

name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.120.242.29

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
        run: |
          set -euo pipefail

          for env_file in "$HOME/docs/.env" /home/jmagar/docs/.env; do
            if [[ -f "$env_file" ]]; then
              set -a
              source "$env_file"
              set +a
              break
            fi
          done
          export OPENAI_COMPATIBLE_BASE_URL="http://100.120.242.29:8317/v1"

          if [[ -z "${OPENAI_COMPATIBLE_API_KEY:-}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_API_KEY is required for OpenWiki updates"
            exit 1
          fi

          response="$(mktemp)"
          status="$(
            curl --silent --show-error --location \
              --output "$response" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${OPENAI_COMPATIBLE_API_KEY}" \
              "${OPENAI_COMPATIBLE_BASE_URL%/}/models" || true
          )"
          if [[ "$status" != "200" ]]; then
            echo "::error::OpenWiki API preflight failed for ${OPENAI_COMPATIBLE_BASE_URL%/}/models with HTTP ${status}"
            head -c 300 "$response"
            echo
            exit 1
          fi

      - name: Run OpenWiki
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
          OPENWIKI_MODEL_ID: gpt-5.3-codex-spark
        run: |
          set -euo pipefail

          for env_file in "$HOME/docs/.env" /home/jmagar/docs/.env; do
            if [[ -f "$env_file" ]]; then
              set -a
              source "$env_file"
              set +a
              break
            fi
          done
          export OPENWIKI_PROVIDER="${OPENWIKI_PROVIDER:-openai-compatible}"
          export OPENAI_COMPATIBLE_BASE_URL="http://100.120.242.29:8317/v1"
          export OPENWIKI_MODEL_ID="${OPENWIKI_MODEL_ID:-gpt-5.3-codex-spark}"

          if [[ -z "${OPENAI_COMPATIBLE_API_KEY:-}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_API_KEY is required for OpenWiki updates"
            exit 1
          fi

          openwiki --update --print
      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
