# Regenerate openwiki/ and open a normal PR whose token can trigger CI.
name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read

concurrency:
  group: openwiki-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: [self-hosted, unraid]
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check required credentials
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          set -euo pipefail
          test -n "$OPENAI_COMPATIBLE_API_KEY"
          test -n "$RELEASE_PLEASE_TOKEN"
          test -n "$TS_OAUTH_CLIENT_ID"
          test -n "$TS_OAUTH_SECRET"

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.120.242.29

      - name: Install pinned OpenWiki CLI
        run: npm install --global openwiki@0.1.2

      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
        run: |
          set -euo pipefail
          response="$(mktemp)"
          trap 'rm -f "$response"' EXIT
          status="$(
            curl --silent --show-error --location \
              --output "$response" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${OPENAI_COMPATIBLE_API_KEY}" \
              "${OPENAI_COMPATIBLE_BASE_URL%/}/models"
          )"
          if [[ "$status" != "200" ]]; then
            echo "::error::OpenWiki API preflight returned HTTP ${status}"
            head -c 300 "$response"
            echo
            exit 1
          fi

      - name: Run OpenWiki
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
          OPENWIKI_MODEL_ID: gpt-5.3-codex-spark
        run: openwiki --update --print

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # A GitHub App installation token or fine-grained PAT is required so
          # the PR's pull_request event runs CI. GITHUB_TOKEN suppresses it.
          # Reuse the repository-scoped PAT/App token that release-please uses;
          # it is already provisioned and, unlike GITHUB_TOKEN, triggers CI.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          add-paths: openwiki
          branch: openwiki/update
          delete-branch: true
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            Merge only after all required CI and MSRV checks pass.

  notify:
    name: Notify OpenWiki failure
    if: ${{ always() && needs.update.result == 'failure' }}
    needs: update
    runs-on: [self-hosted, unraid]
    permissions:
      issues: write
    steps:
      - name: Create or reuse documentation incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search 'OpenWiki update failed in:title' --json number --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "OpenWiki update failed again: ${RUN_URL}"
          else
            gh issue create --title "OpenWiki update failed" --body "The scheduled documentation update failed: ${RUN_URL}"
          fi
