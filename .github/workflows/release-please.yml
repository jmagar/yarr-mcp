name: release-please

# Drives versioning and changelog updates from Conventional Commits.
#
# On successful CI runs for main, release-please maintains a release PR that
# bumps Cargo.toml/Cargo.lock, packages/yarr-mcp/package.json, server.json, and
# CHANGELOG.md. Merging that PR creates the vX.Y.Z tag and a draft GitHub
# Release. The tag triggers release.yml, which stages binaries and npm before
# making the release public.
#
# IMPORTANT: `token` must be a PAT or GitHub App token with contents:write and
# pull-requests:write. The default GITHUB_TOKEN does not trigger downstream
# release workflows for tags/releases it creates. Store it as RELEASE_PLEASE_TOKEN.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, unraid]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Require release-please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: test -n "$RELEASE_PLEASE_TOKEN"

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps JSON scalar version fields (package.json, server.json)
      # but cannot template the version embedded in launcher-arg strings such as
      # `["-y", "yarr-mcp@1.1.1", "mcp"]`. Re-couple those pins on the open release
      # PR so its CI (coupled-version contract, plugin_contract) stays green.
      - name: Check out release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Sync plugin manifest launcher pins
        if: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          node scripts/sync-plugin-manifests.js
          if git diff --quiet; then
            echo "Plugin manifest launcher pins already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --all --message "chore: sync plugin manifest launcher pins to release version"
          git push
