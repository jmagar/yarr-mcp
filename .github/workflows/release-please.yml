name: release-please

# Drives versioning and changelog updates from Conventional Commits.
#
# On successful CI runs for main, release-please maintains a release PR that
# bumps Cargo.toml/Cargo.lock, packages/yarr-mcp/package.json, server.json, and
# CHANGELOG.md. Merging that PR creates the vX.Y.Z tag and GitHub Release. The
# published release event then triggers release.yml, which builds and attaches
# binaries and publishes the matching npm package.
#
# IMPORTANT: `token` must be a PAT or GitHub App token with contents:write and
# pull-requests:write. The default GITHUB_TOKEN does not trigger downstream
# release workflows for tags/releases it creates. Store it as RELEASE_PLEASE_TOKEN.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Require release-please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: test -n "$RELEASE_PLEASE_TOKEN"

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
