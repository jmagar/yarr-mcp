# =============================================================================
# .github/workflows/release.yml — Build release binaries and GitHub Release
#
# Triggers: push of v* tags (e.g. v1.2.3)
#
# What this does:
#   1. Builds release binaries for linux/amd64 and windows/amd64
#   2. Creates a GitHub Release with binaries (+ SHA256SUMS) as downloadable
#      assets. Binaries are distributed exclusively as Release assets;
#      plugin install.sh downloads them from the Release (see install.sh,
#      which fetches from releases/download/${VERSION} — no `git lfs pull`).
#
# NOTE: A previous version of this workflow committed binaries to bin/ via Git
# LFS and pushed directly to `main` from this tag-triggered workflow. That
# bypassed branch protection and has been removed — see git history. Binaries
# now ship only as Release assets.
# =============================================================================

name: Release

on:
  push:
    tags: ["v*"]

# A release run must never be cancelled midway — a partial release (binaries
# built but Release not created, or vice versa) is worse than a queued one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: rustarr

jobs:
  # ── Build release binaries ────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux/amd64 — most common deployment target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            ext: ""
          # windows/amd64 — cross-compiled via MinGW
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            arch: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Windows on Linux runners.
      - name: Install cross-compilation tools (windows only)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-release-${{ matrix.target }}-

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare binary artifact
        run: |
          mkdir -p package artifacts
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          chmod +x package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          tar -C package -czf artifacts/${{ env.BINARY_NAME }}-${{ matrix.arch }}.tar.gz \
            ${{ env.BINARY_NAME }}${{ matrix.ext }}

      - name: Upload artifact
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: artifacts/

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: softprops/action-gh-release@v3.0.1
        with:
          # GitHub generates release notes from merged commits and PRs.
          generate_release_notes: true
          files: artifacts/*
