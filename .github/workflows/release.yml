# =============================================================================
# .github/workflows/release.yml — Build release binaries and publish artifacts
#
# Triggers: published GitHub Releases created by release-please.
#
# What this does:
#   1. Builds release binaries for linux/amd64 and windows/amd64
#   2. Attaches binaries (+ SHA256SUMS) to the release-please GitHub Release
#   3. Publishes the matching yarr-mcp npm package.
#
# NOTE: A previous version of this workflow committed binaries to bin/ via Git
# LFS and pushed directly to `main` from this tag-triggered workflow. That
# bypassed branch protection and has been removed — see git history. Binaries
# now ship only as Release assets.
# =============================================================================

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish artifacts for
        required: true
        type: string

# A release run must never be cancelled midway — a partial release (binaries
# built but Release not created, or vice versa) is worse than a queued one.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  BINARY_NAME: yarr
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  # ── Build release binaries ────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux/amd64 — most common deployment target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            ext: ""
          # windows/amd64 — cross-compiled via MinGW
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            arch: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compilation toolchain for Windows on Linux runners.
      - name: Install cross-compilation tools (windows only)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-release-${{ matrix.target }}-

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare binary artifact
        run: |
          mkdir -p package artifacts
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          chmod +x package/${{ env.BINARY_NAME }}${{ matrix.ext }}
          tar -C package -czf artifacts/${{ env.BINARY_NAME }}-${{ matrix.arch }}.tar.gz \
            ${{ env.BINARY_NAME }}${{ matrix.ext }}

      - name: Upload artifact
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: artifacts/

  # ── Attach GitHub Release assets ─────────────────────────────────────────────
  release:
    name: Attach GitHub Release Assets
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload GitHub Release assets
        # TODO(security): pin to full commit SHA like the other actions above.
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*

  # ── Publish npm launcher ────────────────────────────────────────────────────
  npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches tag
        run: |
          package_version="$(node -p "require('./packages/yarr-mcp/package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "packages/yarr-mcp/package.json version ${package_version} does not match tag ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: npm test
        run: npm test --prefix packages/yarr-mcp

      - name: npm run check
        run: npm run check --prefix packages/yarr-mcp

      - name: npm pack dry run
        run: npm pack --dry-run --json ./packages/yarr-mcp

      - name: Check npm package version
        id: npm-version
        run: |
          package_version="$(node -p "require('./packages/yarr-mcp/package.json').version")"
          if npm view "yarr-mcp@${package_version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish yarr-mcp
        if: ${{ steps.npm-version.outputs.published != 'true' }}
        run: npm publish --provenance --access public ./packages/yarr-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
