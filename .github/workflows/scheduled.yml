# =============================================================================
# .github/workflows/scheduled.yml - periodic + on-demand maintenance scans
#
# Surfaces new RUSTSEC advisories on a weekly cadence without anyone pushing,
# and gives maintainers a manual button to re-run the full dependency audit
# (advisories + bans + licenses + sources) on demand.
#
# The per-PR `audit` job in ci.yml still gates merges; this workflow is the
# safety net that catches advisories filed against already-merged code.
# =============================================================================

name: Scheduled

on:
  schedule:
    # Weekly, Monday 06:43 UTC. Off-peak; offset minute avoids the :00 stampede.
    - cron: "43 6 * * 1"
  workflow_dispatch:
    inputs:
      full_audit:
        description: "Run the full cargo-deny suite (advisories, bans, licenses, sources)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  advisories:
    name: Dependency Advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check security exception deadlines
        run: bash scripts/check-security-exceptions.sh

      - name: cargo deny check (advisories)
        if: ${{ github.event_name == 'schedule' || !inputs.full_audit }}
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features
          command-arguments: advisories

      - name: cargo deny check (full suite)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_audit }}
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features

      - name: Record failed dependency scan
        if: failure()
        run: |
          {
            echo "## Dependency scan failed"
            echo
            echo "Review the cargo-deny output and the dependency-response runbook."
            echo "Run: \`cargo deny --all-features check advisories\`"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify dependency scan failure
    if: ${{ always() && needs.advisories.result == 'failure' }}
    needs: advisories
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or reuse incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search 'Scheduled dependency scan failed in:title' --json number --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "Dependency scan failed again: ${RUN_URL}"
          else
            gh issue create \
              --title "Scheduled dependency scan failed" \
              --body "The scheduled cargo-deny safety net failed: ${RUN_URL}\n\nRunbook: docs/runbooks/dependency-response.md"
          fi
