name: Release Unraid plugin

on:
  push:
    tags:
      - "unraid-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing package tag in unraid-vVERSION-BUILD form
        required: true
        type: string
        default: "unraid-v2.1.0-1"

permissions:
  contents: read

concurrency:
  group: unraid-plugin-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.18.0"

jobs:
  prepare:
    name: Resolve and validate frozen release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      package_tag: ${{ steps.identity.outputs.package_tag }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      plugin_version: ${{ steps.identity.outputs.plugin_version }}
      package_build: ${{ steps.identity.outputs.package_build }}
      package_file: ${{ steps.identity.outputs.package_file }}
      package_sha256: ${{ steps.identity.outputs.package_sha256 }}
      upstream_sha256: ${{ steps.identity.outputs.upstream_sha256 }}
    env:
      PACKAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Resolve immutable package tag
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$PACKAGE_TAG" =~ ^unraid-v[0-9]+\.[0-9]+\.[0-9]+-[1-9][0-9]*$ ]] || {
            echo "::error::Package tag must match unraid-vVERSION-BUILD"
            exit 1
          }
          object="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${PACKAGE_TAG}")"
          object_type="$(jq -er '.object.type' <<<"$object")"
          object_sha="$(jq -er '.object.sha' <<<"$object")"
          depth=0
          while [[ "$object_type" == tag ]]; do
            depth=$((depth + 1))
            test "$depth" -le 8
            object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}")"
            object_type="$(jq -er '.object.type' <<<"$object")"
            object_sha="$(jq -er '.object.sha' <<<"$object")"
          done
          [[ "$object_type" == commit && "$object_sha" =~ ^[0-9a-f]{40}$ ]]
          printf 'source_sha=%s\n' "$object_sha" >> "$GITHUB_OUTPUT"

      - name: Check out resolved package commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.resolve.outputs.source_sha }}
          persist-credentials: false

      - name: Validate frozen release identity
        id: identity
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.resolve.outputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          [[ "$PACKAGE_TAG" =~ ^unraid-v([0-9]+\.[0-9]+\.[0-9]+)-([1-9][0-9]*)$ ]]
          plugin_version="${BASH_REMATCH[1]}"
          package_build="${BASH_REMATCH[2]}"
          package_file="yarr-${plugin_version}-x86_64-${package_build}.txz"
          package_sha256="$(jq -er '.packageSha256 | select(test("^[0-9a-f]{64}$"))' unraid-plugin/release-manifest.json)"
          upstream_sha256="$(jq -er '.upstreamBinarySha256 | select(test("^[0-9a-f]{64}$"))' unraid-plugin/release-manifest.json)"
          jq -e --arg version "$plugin_version" --argjson build "$package_build" \
            --arg file "$package_file" --arg tag "$PACKAGE_TAG" \
            --arg packageSha "$package_sha256" --arg upstreamSha "$upstream_sha256" '
              .pluginVersion == $version and
              .apiVersion == $version and
              .packageBuild == $build and
              .packageFile == $file and
              .packageSha256 == $packageSha and
              .upstreamBinarySha256 == $upstreamSha and
              .packageUrl ==
                ("https://github.com/dinglebear-ai/yarr/releases/download/" + $tag + "/" + $file) and
              .binaryRepository == "dinglebear-ai/yarr" and
              .binaryAsset == "yarr-x86_64.tar.gz"
            ' unraid-plugin/release-manifest.json >/dev/null
          test -f "unraid-plugin/packages/$package_file"
          test "$(sha256sum "unraid-plugin/packages/$package_file" | cut -d' ' -f1)" = "$package_sha256"
          grep -Fq "<!ENTITY version    \"${plugin_version}-${package_build}\">" unraid-plugin/yarr.plg
          grep -Fq "<!ENTITY txz        \"${package_file}\">" unraid-plugin/yarr.plg
          grep -Fq "<!ENTITY sha256     \"${package_sha256}\">" unraid-plugin/yarr.plg
          grep -Fq "releases/download/${PACKAGE_TAG}/${package_file}" unraid-plugin/yarr.plg
          {
            printf 'package_tag=%s\n' "$PACKAGE_TAG"
            printf 'plugin_version=%s\n' "$plugin_version"
            printf 'package_build=%s\n' "$package_build"
            printf 'package_file=%s\n' "$package_file"
            printf 'package_sha256=%s\n' "$package_sha256"
            printf 'upstream_sha256=%s\n' "$upstream_sha256"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Reproduce frozen release payload
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PACKAGE_TAG: ${{ needs.prepare.outputs.package_tag }}
      SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
      PLUGIN_VERSION: ${{ needs.prepare.outputs.plugin_version }}
      PACKAGE_BUILD: ${{ needs.prepare.outputs.package_build }}
      PACKAGE_FILE: ${{ needs.prepare.outputs.package_file }}
      PACKAGE_SHA256: ${{ needs.prepare.outputs.package_sha256 }}
      UPSTREAM_SHA256: ${{ needs.prepare.outputs.upstream_sha256 }}
    steps:
      - name: Check out resolved package commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false

      - name: Set up pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            unraid-plugin/api/package-lock.json
            unraid-plugin/web/package-lock.json

      - name: Install package verification tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq libxml2-utils python3-yaml shellcheck xz-utils

      - name: Test and build API extension
        shell: bash
        run: cd unraid-plugin/api && npm ci && npm test && npx tsc --noEmit && npx tsc

      - name: Test and build settings and dashboard elements
        shell: bash
        run: cd unraid-plugin/web && npm ci && npm test && npx vue-tsc --noEmit && npm run build

      - name: Run release contracts
        shell: bash
        run: |
          set -euo pipefail
          find unraid-plugin -path '*/node_modules' -prune -o \
            -type f -name '*.sh' -print0 |
            sort -z |
            xargs -0 shellcheck -S error
          bash unraid-plugin/tests/run.sh

      - name: Snapshot committed release inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          mkdir -p .release/committed
          cp -- "unraid-plugin/packages/$PACKAGE_FILE" .release/committed/
          cp -- unraid-plugin/yarr.plg unraid-plugin/release-manifest.json .release/committed/
          committed_package_sha="$(sha256sum ".release/committed/$PACKAGE_FILE" | cut -d' ' -f1)"
          test "$committed_package_sha" = "$PACKAGE_SHA256"
          plugin_package_sha="$(sed -n 's/.*<!ENTITY sha256[[:space:]]*"\([0-9a-f]*\)".*/\1/p' .release/committed/yarr.plg)"
          test "$plugin_package_sha" = "$PACKAGE_SHA256"
          test "$(jq -r '.packageSha256' .release/committed/release-manifest.json)" = "$PACKAGE_SHA256"
          test "$(jq -r '.upstreamBinarySha256' .release/committed/release-manifest.json)" = "$UPSTREAM_SHA256"

      - name: Snapshot and download upstream binary inputs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .release/upstream
          repository="$(jq -r '.binaryRepository' .release/committed/release-manifest.json)"
          asset="$(jq -r '.binaryAsset' .release/committed/release-manifest.json)"
          UPSTREAM_TAG="v${PLUGIN_VERSION}"
          bash unraid-plugin/scripts/github-release-provenance.sh snapshot \
            "$repository" "$UPSTREAM_TAG" > .release/upstream-asset-snapshot.json
          jq -e --arg asset "$asset" '
            ([.assets[].name] | sort) == ([$asset, ($asset + ".sha256")] | sort)
          ' .release/upstream-asset-snapshot.json >/dev/null
          asset_digest="$(jq -r --arg asset "$asset" '.assets[] | select(.name == $asset) | .digest' .release/upstream-asset-snapshot.json)"
          test "$asset_digest" = "sha256:${UPSTREAM_SHA256}"
          gh release download "$UPSTREAM_TAG" --repo "$repository" \
            --pattern "$asset" --pattern "${asset}.sha256" --dir .release/upstream
          actual_upstream_sha="$(sha256sum ".release/upstream/$asset" | cut -d' ' -f1)"
          test "$actual_upstream_sha" = "$UPSTREAM_SHA256"
          (cd .release/upstream && sha256sum --check "${asset}.sha256")

      - name: Build twice and byte-match committed package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release/repro
          umask 022
          YARR_RELEASE_ASSET_DIR="$PWD/.release/upstream" \
            bash unraid-plugin/scripts/build-package.sh "$PLUGIN_VERSION" "$PACKAGE_BUILD"
          bash unraid-plugin/scripts/verify-package.sh
          test "$(sha256sum "unraid-plugin/packages/$PACKAGE_FILE" | cut -d' ' -f1)" = "$PACKAGE_SHA256"
          cmp -- .release/committed/"$PACKAGE_FILE" "unraid-plugin/packages/$PACKAGE_FILE"
          cp -- "unraid-plugin/packages/$PACKAGE_FILE" .release/repro/umask-022.txz
          umask 077
          YARR_RELEASE_ASSET_DIR="$PWD/.release/upstream" \
            bash unraid-plugin/scripts/build-package.sh "$PLUGIN_VERSION" "$PACKAGE_BUILD"
          bash unraid-plugin/scripts/verify-package.sh
          test "$(sha256sum "unraid-plugin/packages/$PACKAGE_FILE" | cut -d' ' -f1)" = "$PACKAGE_SHA256"
          cmp -- .release/committed/"$PACKAGE_FILE" "unraid-plugin/packages/$PACKAGE_FILE"
          cmp -- .release/repro/umask-022.txz "unraid-plugin/packages/$PACKAGE_FILE"
          root="$(mktemp -d)"
          trap 'rm -rf "$root"' EXIT
          tar --same-permissions -xJf .release/committed/"$PACKAGE_FILE" -C "$root"
          test "$("$root/usr/local/yarr/bin/yarr" --version)" = "yarr ${PLUGIN_VERSION}"

      - name: Assemble committed checksummed release inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release/assets
          cp -- .release/committed/"$PACKAGE_FILE" .release/assets/
          cp -- .release/committed/yarr.plg .release/committed/release-manifest.json .release/assets/
          cp -- .release/upstream-asset-snapshot.json .release/assets/
          tar -xOJf .release/committed/"$PACKAGE_FILE" \
            usr/local/emhttp/plugins/yarr/package-manifest.sha256 \
            > .release/assets/package-manifest.sha256
          package_sha="$(sha256sum ".release/assets/$PACKAGE_FILE" | cut -d' ' -f1)"
          plugin_sha="$(sha256sum .release/assets/yarr.plg | cut -d' ' -f1)"
          manifest_sha="$(sha256sum .release/assets/release-manifest.json | cut -d' ' -f1)"
          embedded_sha="$(sha256sum .release/assets/package-manifest.sha256 | cut -d' ' -f1)"
          snapshot_sha="$(sha256sum .release/assets/upstream-asset-snapshot.json | cut -d' ' -f1)"
          test "$package_sha" = "$PACKAGE_SHA256"
          jq -n -S \
            --arg tag "$PACKAGE_TAG" \
            --arg sourceSha "$SOURCE_SHA" \
            --arg version "$PLUGIN_VERSION" \
            --argjson build "$PACKAGE_BUILD" \
            --arg upstreamSha "$UPSTREAM_SHA256" \
            --arg package "$PACKAGE_FILE" \
            --arg packageSha "$package_sha" \
            --argjson packageBytes "$(stat -c %s ".release/assets/$PACKAGE_FILE")" \
            --arg pluginSha "$plugin_sha" \
            --argjson pluginBytes "$(stat -c %s .release/assets/yarr.plg)" \
            --arg manifestSha "$manifest_sha" \
            --argjson manifestBytes "$(stat -c %s .release/assets/release-manifest.json)" \
            --arg embeddedSha "$embedded_sha" \
            --argjson embeddedBytes "$(stat -c %s .release/assets/package-manifest.sha256)" \
            --arg snapshotSha "$snapshot_sha" \
            --argjson snapshotBytes "$(stat -c %s .release/assets/upstream-asset-snapshot.json)" '
              {
                schemaVersion: 1,
                releaseTag: $tag,
                sourceCommit: $sourceSha,
                pluginVersion: $version,
                packageBuild: $build,
                upstreamBinarySha256: $upstreamSha,
                assets: [
                  {name: $package, role: "classic-package", sha256: $packageSha, bytes: $packageBytes},
                  {name: "yarr.plg", role: "installer", sha256: $pluginSha, bytes: $pluginBytes},
                  {name: "release-manifest.json", role: "release-metadata", sha256: $manifestSha, bytes: $manifestBytes},
                  {name: "package-manifest.sha256", role: "payload-inventory", sha256: $embeddedSha, bytes: $embeddedBytes},
                  {name: "upstream-asset-snapshot.json", role: "input-provenance", sha256: $snapshotSha, bytes: $snapshotBytes}
                ]
              }
            ' > .release/assets/release-inventory.json
          for file in "$PACKAGE_FILE" yarr.plg release-manifest.json \
            package-manifest.sha256 upstream-asset-snapshot.json release-inventory.json; do
            (
              cd .release/assets
              sha256sum -- "$file" > "${file}.sha256"
              sha256sum --check "${file}.sha256"
            )
          done
          jq -e --arg tag "$PACKAGE_TAG" --arg source "$SOURCE_SHA" \
            --arg version "$PLUGIN_VERSION" --argjson build "$PACKAGE_BUILD" \
            --arg upstream "$UPSTREAM_SHA256" '
              .schemaVersion == 1 and
              .releaseTag == $tag and
              .sourceCommit == $source and
              .pluginVersion == $version and
              .packageBuild == $build and
              .upstreamBinarySha256 == $upstream and
              (.assets | length == 5) and
              ([.assets[].name] | unique | length) == 5
            ' .release/assets/release-inventory.json >/dev/null

      - name: Upload immutable release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yarr-unraid-release-${{ needs.prepare.outputs.package_tag }}
          path: .release/assets/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified package release
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      PACKAGE_TAG: ${{ needs.prepare.outputs.package_tag }}
      SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
      PLUGIN_VERSION: ${{ needs.prepare.outputs.plugin_version }}
      PACKAGE_BUILD: ${{ needs.prepare.outputs.package_build }}
      PACKAGE_FILE: ${{ needs.prepare.outputs.package_file }}
      PACKAGE_SHA256: ${{ needs.prepare.outputs.package_sha256 }}
      UPSTREAM_SHA256: ${{ needs.prepare.outputs.upstream_sha256 }}
    steps:
      - name: Check out resolved package commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false

      - name: Download immutable release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: yarr-unraid-release-${{ needs.prepare.outputs.package_tag }}
          path: release-assets

      - name: Reverify every local asset
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t actual < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          expected=(
            "$PACKAGE_FILE"
            "${PACKAGE_FILE}.sha256"
            package-manifest.sha256
            package-manifest.sha256.sha256
            release-inventory.json
            release-inventory.json.sha256
            release-manifest.json
            release-manifest.json.sha256
            upstream-asset-snapshot.json
            upstream-asset-snapshot.json.sha256
            yarr.plg
            yarr.plg.sha256
          )
          mapfile -t expected < <(printf '%s\n' "${expected[@]}" | sort)
          test "${actual[*]}" = "${expected[*]}"
          (
            cd release-assets
            for checksum in *.sha256; do
              sha256sum --check "$checksum"
            done
          )
          while IFS=$'\t' read -r name sha bytes; do
            test -f "release-assets/$name"
            test "$(sha256sum "release-assets/$name" | cut -d' ' -f1)" = "$sha"
            test "$(stat -c %s "release-assets/$name")" = "$bytes"
          done < <(jq -r '.assets[] | [.name, .sha256, (.bytes | tostring)] | @tsv' \
            release-assets/release-inventory.json)
          test "$(jq -r '.sourceCommit' release-assets/release-inventory.json)" = "$SOURCE_SHA"
          test "$(jq -r '.upstreamBinarySha256' release-assets/release-inventory.json)" = "$UPSTREAM_SHA256"
          test "$(jq -r '.packageSha256' release-assets/release-manifest.json)" = "$PACKAGE_SHA256"
          test "$(jq -r '.upstreamBinarySha256' release-assets/release-manifest.json)" = "$UPSTREAM_SHA256"
          test "$(sha256sum "release-assets/$PACKAGE_FILE" | cut -d' ' -f1)" = "$PACKAGE_SHA256"
          grep -Fq "<!ENTITY sha256     \"${PACKAGE_SHA256}\">" release-assets/yarr.plg

      - name: Final immutable input verification
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash unraid-plugin/scripts/github-release-provenance.sh verify "$GITHUB_REPOSITORY" "$PACKAGE_TAG" "$SOURCE_SHA" "v${PLUGIN_VERSION}" release-assets/upstream-asset-snapshot.json

      - name: Publish package release transactionally
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash unraid-plugin/scripts/publish-package-release.sh "$GITHUB_REPOSITORY" "$PACKAGE_TAG" "$SOURCE_SHA" "$PLUGIN_VERSION" "$PACKAGE_BUILD" release-assets release-assets/upstream-asset-snapshot.json
