# Safe local default configuration for Yarr.
#
# Secrets and upstream URLs belong in ~/.yarr/.env or process environment:
# YARR_SERVICES, YARR_<SERVICE>_URL, and credential variables.

[yarr]
services = []

[mcp]
host = "127.0.0.1"
port = 40070
server_name = "yarr-mcp"
no_auth = false
trusted_gateway = false
allowed_hosts = []
allowed_origins = []

[mcp.auth]
mode = "bearer"
