groups:
  - name: yarr-runtime
    rules:
      - alert: YarrNotReady
        expr: probe_success{job="yarr-ready"} == 0 or absent(probe_success{job="yarr-ready"})
        for: 5m
        labels:
          severity: critical
          owner: yarr
        annotations:
          summary: Yarr readiness probe is failing
          runbook: docs/runbooks/deployment-rollback.md

      - alert: YarrUpstreamErrorRate
        expr: |
          (
            sum by (service, kind) (rate(yarr_upstream_requests_total{outcome!="success"}[10m]))
            /
            clamp_min(sum by (service, kind) (rate(yarr_upstream_requests_total[10m])), 0.001)
          ) > 0.20
          and
          sum by (service, kind) (rate(yarr_upstream_requests_total[10m])) > 0.05
        for: 10m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr upstream error rate exceeds 20 percent
          runbook: docs/runbooks/upstream-failures.md

      - alert: YarrAuthenticationFailures
        expr: sum by (reason) (rate(yarr_auth_failures_total[10m])) > 0.10
        for: 10m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr authentication failures are sustained
          runbook: docs/runbooks/authentication-failures.md

      - alert: YarrOAuthTokenRateLimited
        expr: increase(yarr_auth_token_issuance_total{outcome="rate_limited"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr rejected OAuth token requests at its process-wide limit
          runbook: docs/runbooks/authentication-failures.md

      - alert: YarrQbittorrentReloginFailure
        expr: increase(yarr_qbittorrent_relogins_total{outcome="failed"}[15m]) >= 3
        for: 5m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr qBittorrent SID relogin repeatedly failed
          runbook: docs/runbooks/upstream-failures.md

      - alert: YarrCodeModeConcurrencyHigh
        expr: yarr_codemode_active >= 4
        for: 10m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr Code Mode is continuously at the default concurrency limit
          runbook: docs/runbooks/resource-pressure.md

      - alert: YarrCodeModeFailureRate
        expr: |
          (
            sum(rate(yarr_codemode_runs_total{outcome="failed"}[10m]))
            /
            clamp_min(sum(rate(yarr_codemode_runs_total{outcome=~"completed|failed"}[10m])), 0.001)
          ) > 0.20
          and
          sum(rate(yarr_codemode_runs_total{outcome=~"completed|failed"}[10m])) > 0.05
        for: 10m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr Code Mode failure rate exceeds 20 percent
          runbook: docs/runbooks/resource-pressure.md

      - alert: YarrArtifactWriteFailures
        expr: increase(yarr_artifact_bytes_total{outcome="error"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr artifact writes are failing
          runbook: docs/runbooks/resource-pressure.md

      - alert: YarrSnippetOperationFailures
        expr: sum by (operation) (increase(yarr_snippet_operations_total{outcome="error"}[15m])) >= 3
        for: 5m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr snippet operations are repeatedly failing
          runbook: docs/runbooks/resource-pressure.md

      - alert: YarrLogQueueDroppingEvents
        expr: increase(yarr_log_events_dropped_total{reason="queue_full"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          owner: yarr
        annotations:
          summary: Yarr async JSON log queue is sustaining event loss
          runbook: docs/runbooks/resource-pressure.md
