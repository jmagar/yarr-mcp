# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []                # check all targets
all-features = false
no-default-features = false

# ── Advisories ────────────────────────────────────────────────────────────────

[advisories]
version = 2
# `spin 0.9.8` is yanked but remains an exact transitive requirement of both
# lazy_static and the RSA stack. Treat yanks as visible policy warnings while
# advisories remain deny; the time-bounded RSA exception above forces review.
yanked = "warn"

# Reviewed exception deadline: 2026-10-01. CI must remove or renew this entry
# with a fresh threat-model review by that date.
ignore = [
  # RUSTSEC-2023-0071 — Marvin Attack (RSA timing side-channel) in the `rsa` crate.
  # Pulled in transitively: lab-auth → jsonwebtoken → rsa v0.9.10 / v0.10.0-rc.18.
  # No upstream fix exists yet (reviewed 2026-07-16). Yarr requires HTTPS,
  # restricts key permissions, issues short-lived tokens only after OAuth grant
  # validation, and caps /token signing attempts to 30/minute per process while
  # exporting rate-limit metrics. Migrate lab-auth to Ed25519 before the deadline.
  { id = "RUSTSEC-2023-0071", reason = "temporary JWT-only exception through 2026-10-01; HTTPS, restrictive key storage, validated grants, token rate limiting and monitoring mitigate timing-oracle exposure" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",                           # foldhash (via hashbrown → rusqlite → lab-auth)
  "MPL-2.0",                        # option-ext (via dirs-sys → dirs)
  "CDLA-Permissive-2.0",            # webpki-roots / webpki-root-certs (via reqwest → rustls)
]
# Confidence threshold for license text detection (0.0–1.0)
confidence-threshold = 0.8

# ── Bans ──────────────────────────────────────────────────────────────────────

[bans]
# Deny multiple versions of the same crate — forces explicit resolution
multiple-versions = "warn"
# "warn" not "deny": git deps with a pinned rev have no semver version field,
# which cargo-deny treats as a wildcard — but the rev IS the pin.
wildcards = "warn"
# Allow path deps (e.g. the self-referencing dev dep) to omit a version.
allow-wildcard-paths = true

# Crates we never want pulled in
deny = [
  # openssl (native) — this project uses rustls; openssl appearing means a dep
  # silently pulled in native SSL. Use the rustls feature flag instead.
  { name = "openssl" },
  { name = "openssl-sys" },
]

# Known duplicate version pairs that can't be resolved yet — remove when fixed
skip = []

skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  # lab-auth is vendored from the private lab mono-repo at a pinned rev
  "https://github.com/jmagar/lab.git",
]
