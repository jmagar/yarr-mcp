# =============================================================================
# docker-compose.prod.yml — Production deployment for rustarr-mcp
# =============================================================================

name: rustarr

x-common-service: &common-service
  networks:
    - mcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  rustarr-mcp:
    <<: *common-service
    image: ghcr.io/jmagar/rustarr-mcp:${RUSTARR_MCP_VERSION:-latest}
    container_name: rustarr-mcp
    env_file:
      - path: .env
        required: false
    environment:
      RUSTARR_MCP_HOST: 0.0.0.0
      RUSTARR_MCP_ALLOWED_HOSTS: "rustarr.tootie.tv,localhost,127.0.0.1"
      RUSTARR_MCP_ALLOWED_ORIGINS: "https://rustarr.tootie.tv"
    ports:
      - "${RUSTARR_MCP_HOST_PORT:-40070}:40070/tcp"
    volumes:
      - ${HOME}/.rustarr:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40070/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  rustarr-mcp-data:

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
