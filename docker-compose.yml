# =============================================================================
# docker-compose.yml — Local development stack for an rmcp-based MCP server
#
# TEMPLATE: Replace all occurrences of "rustarr" with your service name.
#           Replace all occurrences of "RUSTARR" with your service name in caps.
#
# Usage:
#   docker compose up --build -d   # build from source and start
#   docker compose logs -f         # follow logs
#   docker compose down            # stop and remove containers
# =============================================================================

name: rustarr

services:
  # TEMPLATE: Replace "rustarr-mcp" with your service name throughout this file.
  rustarr-mcp:
    extends:
      file: docker-compose.prod.yml
      service: rustarr-mcp
    image: rustarr:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
