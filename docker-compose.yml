# =============================================================================
# docker-compose.yml — Local development stack for yarr-mcp
#
# Usage:
#   docker compose up --build -d   # build from source and start
#   docker compose logs -f         # follow logs
#   docker compose down            # stop and remove containers
# =============================================================================

name: yarr

services:
  yarr-mcp:
    extends:
      file: docker-compose.prod.yml
      service: yarr-mcp
    image: yarr:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
