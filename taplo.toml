# =============================================================================
# taplo.toml — TOML formatter configuration
#
# TEMPLATE: Copy this file unchanged to any new server repo.
#           taplo is the canonical TOML formatter for the rmcp server family.
#
# Install: cargo install taplo-cli
#          or: mise use taplo
#
# Format all TOML:  taplo format
# Check all TOML:   taplo check     (used in CI and lefthook pre-commit)
# =============================================================================

[formatting]
# Do not align table entries into columns — it creates noisy diffs when any
# key length changes.
align_entries = false

# Always add a trailing comma in multi-line arrays. Keeps diffs clean when
# appending items.
array_trailing_comma = true

# Auto-expand arrays that exceed column_width onto multiple lines.
array_auto_expand = true

# Auto-collapse single-item arrays back to one line when they fit.
array_auto_collapse = true

# Keep short arrays on one line (pairs with array_auto_expand above).
compact_arrays = true

# Keep inline tables on one line — don't expand { key = value } to multi-line.
compact_inline_tables = false

# Maximum line width before taplo wraps. 100 is the sweet spot — wider than
# the common 80 but still readable in side-by-side diffs.
# TEMPLATE: Adjust if your team has a different preference.
column_width = 100

# Two-space indentation throughout.
indent_string = "  "

# Files must end with exactly one newline.
trailing_newline = true

# Allow at most one consecutive blank line (keeps TOML files compact).
allowed_blank_lines = 1
